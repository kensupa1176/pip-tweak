name: Build PiP IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          sudo gem install fpm
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build dylib
        run: |
          export THEOS=$HOME/theos
          make

      - name: Download IPA
        run: |
          FILE_ID="1ejJZsytM3TN8GHV2ahCM6j0YFEREiEJY"
          curl -c /tmp/cookies.txt -s \
            "https://drive.google.com/uc?export=download&id=${FILE_ID}" > /tmp/page.html
          CONFIRM=$(grep -o 'confirm=[^&"]*' /tmp/page.html | head -1 | cut -d= -f2)
          if [ -n "$CONFIRM" ]; then
            curl -L -b /tmp/cookies.txt \
              "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" \
              -o MyApp.ipa
          else
            curl -L \
              "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
              -o MyApp.ipa
          fi

      - name: Inject dylib
        run: |
          brew install insert_dylib
          unzip MyApp.ipa -d MyApp
          APP_PATH=$(ls MyApp/Payload/)
          APP_NAME="${APP_PATH%.app}"
          mkdir -p "MyApp/Payload/${APP_PATH}/Frameworks"
          cp $HOME/theos/obj/arm64/PiPTweak.dylib "MyApp/Payload/${APP_PATH}/Frameworks/" 2>/dev/null || \
          cp .theos/obj/arm64/PiPTweak.dylib "MyApp/Payload/${APP_PATH}/Frameworks/"
          insert_dylib --strip-codesig --inplace \
            "@executable_path/Frameworks/PiPTweak.dylib" \
            "MyApp/Payload/${APP_PATH}/${APP_NAME}"
          cd MyApp && zip -r ../MyApp_pip.ipa Payload

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: MyApp_pip
          path: MyApp_pip.ipa
