name: Build PiP IPA6

on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build dylib
        run: |
          export THEOS=$HOME/theos
          make

      - name: Download IPA
        run: |
          curl -L \
            "https://github.com/kensupa1176/pip-tweak/releases/download/v1.0/Netflix.ipa" \
            -o MyApp.ipa
          ls -lh MyApp.ipa

      - name: Inject dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib.git
          cd insert_dylib
          xcodebuild -scheme insert_dylib -configuration Release SYMROOT=build
          sudo cp build/Release/insert_dylib /usr/local/bin/
          cd ..

          unzip MyApp.ipa -d MyApp
          APP_PATH=$(ls MyApp/Payload/)
          APP_NAME="${APP_PATH%.app}"
          DYLIB_PATH=$(find .theos -name "PiPTweak.dylib" | head -1)
          echo "dylib: $DYLIB_PATH"
          echo "app: $APP_PATH"

          mkdir -p "MyApp/Payload/${APP_PATH}/Frameworks"
          cp "$DYLIB_PATH" "MyApp/Payload/${APP_PATH}/Frameworks/PiPTweak.dylib"

          # Info.plistにaudioバックグラウンドモードを追加
          PLIST="MyApp/Payload/${APP_PATH}/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes: string audio" "$PLIST" 2>/dev/null || true
          echo "Info.plist updated"

          # 署名
          ldid -S "MyApp/Payload/${APP_PATH}/Frameworks/PiPTweak.dylib"

          # インジェクト
          insert_dylib --strip-codesig --inplace \
            "@executable_path/Frameworks/PiPTweak.dylib" \
            "MyApp/Payload/${APP_PATH}/${APP_NAME}"

          # バイナリ再署名
          ldid -S "MyApp/Payload/${APP_PATH}/${APP_NAME}"

          cd MyApp && zip -r ../MyApp_pip.ipa Payload

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: MyApp_pip
          path: MyApp_pip.ipa
