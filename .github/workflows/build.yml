name: Build PiP IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build dylib
        run: |
          source $HOME/.profile || true
          make

      - name: Download IPA (large file)
        run: |
          FILE_ID="1ejJZsytM3TN8GHV2ahCM6j0YFEREiEJY"
          # 大容量ファイル用のダウンロード
          curl -c /tmp/cookies.txt -s \
            "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            | grep -o 'confirm=[^&"]*' \
            | head -1 \
            | xargs -I{} curl -L -b /tmp/cookies.txt \
            "https://drive.google.com/uc?export=download&confirm={}&id=${FILE_ID}" \
            -o MyApp.ipa

      - name: Inject dylib
        run: |
          brew install insert_dylib
          unzip MyApp.ipa -d MyApp
          APP_PATH=$(ls MyApp/Payload/)
          APP_NAME="${APP_PATH%.app}"
          mkdir -p "MyApp/Payload/${APP_PATH}/Frameworks"
          cp .theos/obj/arm64/PiPTweak.dylib "MyApp/Payload/${APP_PATH}/Frameworks/"
          insert_dylib --strip-codesig --inplace \
            "@executable_path/Frameworks/PiPTweak.dylib" \
            "MyApp/Payload/${APP_PATH}/${APP_NAME}"
          cd MyApp && zip -r ../MyApp_pip.ipa Payload

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: MyApp_pip
          path: MyApp_pip.ipa
