name: Build PiP IPA2

on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build dylib
        run: |
          export THEOS=$HOME/theos
          make

      - name: Download IPA
        run: |
          curl -L \
            "https://github.com/kensupa1176/pip-tweak/releases/download/v1.0/MyApp.ipa" \
            -o MyApp.ipa
          ls -lh MyApp.ipa

      - name: Inject dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib.git
          cd insert_dylib
          xcodebuild -scheme insert_dylib -configuration Release SYMROOT=build
          sudo cp build/Release/insert_dylib /usr/local/bin/
          cd ..

          unzip MyApp.ipa -d MyApp
          APP_PATH=$(ls MyApp/Payload/)
          APP_NAME="${APP_PATH%.app}"
          mkdir -p "MyApp/Payload/${APP_PATH}/Frameworks"
          cp .theos/obj/debug/arm64/PiPTweak.dylib "MyApp/Payload/${APP_PATH}/Frameworks/"
          insert_dylib --strip-codesig --inplace \
            "@executable_path/Frameworks/PiPTweak.dylib" \
            "MyApp/Payload/${APP_PATH}/${APP_NAME}"
          cd MyApp && zip -r ../MyApp_pip.ipa Payload

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: MyApp_pip
          path: MyApp_pip.ipa
